kafka:
  # Inside Docker the broker is reachable via the internal listener name.
  # (Use localhost:9094 only when running the producer directly on the host.)
  bootstrap_servers: "kafka:9092"

simulator:
  # Relative to WORKDIR=/app/producer inside the container → resolves to /app/data
  data_dir: "../data"

  # Replay speed: 3600x → 1 hour of data replays in 1 second
  scale: 3600

  loop: true
  log_every_n: 50

minio:
  # In-network MinIO endpoint (matches docker-compose.yml service name).
  endpoint_url: "http://minio:9000"
  access_key: "minioadmin"
  secret_key: "minioadmin123"
  region: "us-east-1"
  reference_bucket: "datalake"
  reference_prefix: "reference"

sideloader:
  data_dir: "../data"
  faker_locale: "en_US"
  faker_seed: 42
  contract_version: "1.0"
