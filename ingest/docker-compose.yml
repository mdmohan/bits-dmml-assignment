version: "3.8"

# ─────────────────────────────────────────────────────────────────────────────
# Olist Ingest Stack
#   Zookeeper  :2181
#   Kafka      :9092 (internal) / :9094 (external / host access)
#   Kafdrop    :9000  → http://<host>:9000
#   MinIO API  :9001  → s3://<host>:9001
#   MinIO UI   :9002  → http://<host>:9002
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Zookeeper ───────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - olist-net
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka Broker ────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"    # internal listener (container-to-container)
      - "9094:9094"    # external listener (host / other VMs)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Two listeners: one for internal container traffic, one for external access
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://${KAFKA_EXTERNAL_HOST:-localhost}:9094
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168   # 7 days per contract
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
    networks:
      - olist-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:9092"]
      interval: 15s
      timeout: 10s
      retries: 8

  # ── Kafka Topic Init (runs once then exits) ─────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - olist-net
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Creating Olist Kafka topics..."
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic olist.order_events    --partitions 3 --replication-factor 1 \
          --config retention.ms=604800000
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic olist.payment_events  --partitions 3 --replication-factor 1 \
          --config retention.ms=604800000
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic olist.delivery_events --partitions 3 --replication-factor 1 \
          --config retention.ms=604800000
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic olist.review_events   --partitions 3 --replication-factor 1 \
          --config retention.ms=604800000
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic olist.inventory_events --partitions 3 --replication-factor 1 \
          --config retention.ms=604800000
        echo "Listing topics:"
        kafka-topics --bootstrap-server kafka:9092 --list
        echo "Done."

  # ── Kafdrop (Kafka UI) ──────────────────────────────────────────────────────
  kafdrop:
    image: obsidiandynamics/kafdrop:4.0.2
    container_name: kafdrop
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:9092
      JVM_OPTS: "-Xms64M -Xmx128M"
      SERVER_SERVLET_CONTEXTPATH: "/"
    networks:
      - olist-net

  # ── MinIO (S3-compatible raw lake) ──────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: minio
    restart: unless-stopped
    ports:
      - "9001:9000"    # S3 API  → s3://localhost:9001
      - "9002:9001"    # Web UI  → http://localhost:9002
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - olist-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO Bucket Init (runs once then exits) ────────────────────────────────
  minio-init:
    image: minio/mc:RELEASE.2024-11-17T19-35-25Z
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - olist-net
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing local/datalake
        mc mb --ignore-existing local/datalake-dead-letter
        echo "Buckets ready:"
        mc ls local/

# ── Networks ────────────────────────────────────────────────────────────────
networks:
  olist-net:
    driver: bridge

# ── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  minio-data:
    driver: local
