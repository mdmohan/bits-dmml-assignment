version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: olist-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - /mnt/data/volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - olist-net

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: olist-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@olist.local
      PGADMIN_DEFAULT_PASSWORD: change_me_pgadmin
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "True"
      PGADMIN_CONFIG_LOGIN_BANNER: "\"Authorized access only\""
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /mnt/data/volumes/pgadmin:/var/lib/pgadmin
    networks:
      - olist-net

networks:
  olist-net:
    external: true
    name: olist-net
